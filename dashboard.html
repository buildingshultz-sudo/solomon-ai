<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Solomon Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8892a4;
  --accent: #00d4aa;
  --yellow: #ffd700;
  --red: #ff4757;
  --green: #00d4aa;
  --border: #2a2a4a;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Login Screen */
.login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.login-screen h1 {
  font-size: 1.5rem;
  margin-bottom: 8px;
  color: var(--accent);
}
.login-screen p {
  color: var(--text-dim);
  margin-bottom: 24px;
  font-size: 0.9rem;
}
.login-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 100%;
  max-width: 320px;
}
.login-box input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  margin-bottom: 12px;
  outline: none;
}
.login-box input:focus { border-color: var(--accent); }
.login-box button {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #1a1a2e;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.login-box button:active { opacity: 0.8; }
.login-error {
  color: var(--red);
  font-size: 0.85rem;
  margin-top: 8px;
  display: none;
}

/* Dashboard */
.dashboard { display: none; padding: 16px; padding-bottom: 80px; }
.dashboard.active { display: block; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 1.2rem;
  color: var(--accent);
  font-weight: 700;
}
.header .connection-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  display: inline-block;
}
.header .connection-dot.connected { background: var(--green); }

/* Status Card */
.status-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.idle { background: var(--green); }
.status-dot.thinking { background: var(--yellow); animation: pulse 1.5s infinite; }
.status-dot.working { background: var(--yellow); animation: pulse 0.8s infinite; }
.status-dot.error { background: var(--red); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.status-text {
  font-size: 1rem;
  font-weight: 600;
}
.status-desc {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 4px;
  margin-left: 22px;
}

/* Quick Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.stat-value {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
}
.stat-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Section Headers */
.section-header {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 16px 0 8px;
}

/* Activity Feed */
.activity-feed {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  max-height: 400px;
  overflow-y: auto;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 0.8rem;
}
.activity-item {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.activity-item:last-child { border-bottom: none; }
.activity-time {
  color: var(--text-dim);
  flex-shrink: 0;
  font-size: 0.7rem;
  min-width: 50px;
}
.activity-badge {
  font-size: 0.65rem;
  padding: 1px 5px;
  border-radius: 4px;
  font-weight: 600;
  flex-shrink: 0;
  text-transform: uppercase;
}
.badge-tool { background: #1e3a5f; color: #5dade2; }
.badge-msg { background: #1e4d3a; color: #58d68d; }
.badge-error { background: #4d1e1e; color: #ff6b6b; }
.badge-status { background: #4d3a1e; color: #f4d03f; }
.activity-text {
  color: var(--text);
  word-break: break-word;
  flex: 1;
}

/* Tool Stats */
.tool-stats {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}
.tool-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.tool-row:last-child { border-bottom: none; }
.tool-name {
  font-family: 'SF Mono', monospace;
  font-size: 0.8rem;
  color: var(--accent);
}
.tool-count {
  font-size: 0.8rem;
  color: var(--text-dim);
}

/* Errors */
.error-list {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.error-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
}
.error-item:last-child { border-bottom: none; }
.error-time {
  color: var(--text-dim);
  font-size: 0.7rem;
}
.error-msg {
  color: var(--red);
  margin-top: 2px;
  word-break: break-word;
}

/* Task Queue */
.task-list {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.task-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
}
.task-item:last-child { border-bottom: none; }
.task-status {
  font-size: 0.65rem;
  padding: 1px 5px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
}
.task-pending { background: #3a3a1e; color: var(--yellow); }
.task-running { background: #1e3a5f; color: #5dade2; }
.task-done { background: #1e4d3a; color: var(--green); }
.task-failed { background: #4d1e1e; color: var(--red); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 20px;
  color: var(--text-dim);
  font-size: 0.85rem;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <h1>Solomon Dashboard</h1>
  <p>Monitoring &amp; Activity Feed</p>
  <div class="login-box">
    <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
    <button onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Invalid password</div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>Solomon</h1>
    <div>
      <span class="connection-dot" id="connDot"></span>
    </div>
  </div>

  <!-- Status -->
  <div class="status-card">
    <div class="status-row">
      <div class="status-dot idle" id="statusDot"></div>
      <div class="status-text" id="statusText">IDLE</div>
    </div>
    <div class="status-desc" id="statusDesc"></div>
  </div>

  <!-- Quick Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="statUptime">--</div>
      <div class="stat-label">Uptime</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statMessages">0</div>
      <div class="stat-label">Messages Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTasks">0</div>
      <div class="stat-label">Tasks Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTools">0</div>
      <div class="stat-label">Tool Calls</div>
    </div>
  </div>

  <!-- Activity Feed -->
  <div class="section-header">Live Activity</div>
  <div class="activity-feed" id="activityFeed">
    <div class="empty-state">Waiting for activity...</div>
  </div>

  <!-- Tool Usage -->
  <div class="section-header">Tool Usage Today</div>
  <div class="tool-stats" id="toolStats">
    <div class="empty-state">No tool calls yet today</div>
  </div>

  <!-- Task Queue -->
  <div class="section-header">Task Queue</div>
  <div class="task-list" id="taskList">
    <div class="empty-state">No tasks in queue</div>
  </div>

  <!-- Recent Errors -->
  <div class="section-header">Recent Errors</div>
  <div class="error-list" id="errorList">
    <div class="empty-state">No recent errors</div>
  </div>
</div>

<script>
let authToken = localStorage.getItem('solomon_dash_token');
let ws = null;
let activityItems = [];
const MAX_ACTIVITY = 100;

// ── LOGIN ────────────────────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('passwordInput').value;
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const data = await resp.json();
    if (data.ok) {
      authToken = data.token;
      localStorage.setItem('solomon_dash_token', authToken);
      showDashboard();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch (err) {
    document.getElementById('loginError').textContent = 'Connection error';
    document.getElementById('loginError').style.display = 'block';
  }
}

document.getElementById('passwordInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') doLogin();
});

// ── DASHBOARD INIT ───────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  loadInitialData();
  connectWebSocket();
  // Refresh stats every 30s
  setInterval(refreshStats, 30000);
}

async function apiFetch(endpoint) {
  const resp = await fetch(endpoint, {
    headers: { 'X-Auth-Token': authToken }
  });
  if (resp.status === 401) {
    localStorage.removeItem('solomon_dash_token');
    authToken = null;
    location.reload();
    return null;
  }
  return resp.json();
}

async function loadInitialData() {
  try {
    const [status, activity, tools, tasks, errors] = await Promise.all([
      apiFetch('/api/status'),
      apiFetch('/api/activity'),
      apiFetch('/api/tools'),
      apiFetch('/api/tasks'),
      apiFetch('/api/errors')
    ]);
    if (status) updateStatus(status.status);
    if (status) updateStats(status.stats, status.uptime);
    if (activity) renderActivity(activity.reverse());
    if (tools) renderToolStats(tools);
    if (tasks) renderTasks(tasks);
    if (errors) renderErrors(errors);
  } catch (err) {
    console.error('Load error:', err);
  }
}

async function refreshStats() {
  try {
    const status = await apiFetch('/api/status');
    if (status) {
      updateStatus(status.status);
      updateStats(status.stats, status.uptime);
    }
    const tools = await apiFetch('/api/tools');
    if (tools) renderToolStats(tools);
  } catch (_) {}
}

// ── WEBSOCKET ────────────────────────────────────────────────────────────
function connectWebSocket() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onopen = () => {
    document.getElementById('connDot').classList.add('connected');
    ws.send(JSON.stringify({ type: 'auth', token: authToken }));
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'auth_ok') {
        console.log('WS authenticated');
      } else if (msg.type === 'auth_fail') {
        localStorage.removeItem('solomon_dash_token');
        location.reload();
      } else if (msg.type === 'status') {
        updateStatus(msg.data);
      } else if (msg.type === 'event') {
        handleEvent(msg.data);
      }
    } catch (_) {}
  };

  ws.onclose = () => {
    document.getElementById('connDot').classList.remove('connected');
    // Reconnect after 3s
    setTimeout(connectWebSocket, 3000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

function handleEvent(event) {
  if (event.type === 'status_change') {
    updateStatus(event.status);
  } else {
    addActivityItem(event);
    // Update stats counters locally
    if (event.type === 'message_received' || event.type === 'message_sent') {
      const el = document.getElementById('statMessages');
      el.textContent = parseInt(el.textContent || '0') + 1;
    }
    if (event.type === 'tool_call' && event.status === 'ok') {
      const el = document.getElementById('statTools');
      el.textContent = parseInt(el.textContent || '0') + 1;
    }
  }
}

// ── UI UPDATES ───────────────────────────────────────────────────────────
function updateStatus(status) {
  if (!status) return;
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const desc = document.getElementById('statusDesc');

  dot.className = 'status-dot ' + (status.state || 'idle').toLowerCase();
  text.textContent = status.state || 'IDLE';
  desc.textContent = status.description || '';
}

function updateStats(stats, uptimeMs) {
  if (stats) {
    document.getElementById('statMessages').textContent = stats.messages || 0;
    document.getElementById('statTasks').textContent = stats.tasks_completed || 0;
    document.getElementById('statTools').textContent = stats.tool_calls || 0;
  }
  if (uptimeMs && uptimeMs > 0) {
    const hours = Math.floor(uptimeMs / 3600000);
    const mins = Math.floor((uptimeMs % 3600000) / 60000);
    document.getElementById('statUptime').textContent = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
  }
}

function renderActivity(items) {
  activityItems = items.slice(-MAX_ACTIVITY);
  const feed = document.getElementById('activityFeed');
  if (!activityItems.length) {
    feed.innerHTML = '<div class="empty-state">Waiting for activity...</div>';
    return;
  }
  feed.innerHTML = activityItems.map(item => activityItemHTML(item)).join('');
  feed.scrollTop = feed.scrollHeight;
}

function addActivityItem(event) {
  activityItems.push(event);
  if (activityItems.length > MAX_ACTIVITY) activityItems.shift();
  const feed = document.getElementById('activityFeed');
  const wasAtBottom = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 20;
  // Remove empty state if present
  const empty = feed.querySelector('.empty-state');
  if (empty) empty.remove();
  feed.insertAdjacentHTML('beforeend', activityItemHTML(event));
  if (wasAtBottom) feed.scrollTop = feed.scrollHeight;
}

function activityItemHTML(item) {
  const ts = item.timestamp || item.created_at || '';
  const time = ts ? new Date(ts).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) : '--:--';
  let badge = '';
  let text = item.summary || item.tool_name || item.type || '';
  const type = item.type || '';

  if (type === 'tool_call') {
    badge = '<span class="activity-badge badge-tool">TOOL</span>';
    text = item.tool_name ? `${item.tool_name}${item.status === 'ok' && item.duration_ms ? ` (${item.duration_ms}ms)` : item.status === 'started' ? ' ...' : ''}` : text;
  } else if (type === 'message_received') {
    badge = '<span class="activity-badge badge-msg">IN</span>';
  } else if (type === 'message_sent') {
    badge = '<span class="activity-badge badge-msg">OUT</span>';
  } else if (type === 'error' || item.status === 'error') {
    badge = '<span class="activity-badge badge-error">ERR</span>';
  } else if (type === 'status_change') {
    badge = '<span class="activity-badge badge-status">STS</span>';
    text = item.status ? `${item.status.state}${item.status.description ? ': ' + item.status.description : ''}` : text;
  } else {
    badge = '<span class="activity-badge badge-status">' + type.slice(0,4).toUpperCase() + '</span>';
  }

  return `<div class="activity-item"><span class="activity-time">${time}</span>${badge}<span class="activity-text">${escapeHtml(text)}</span></div>`;
}

function renderToolStats(tools) {
  const el = document.getElementById('toolStats');
  if (!tools || !tools.length) {
    el.innerHTML = '<div class="empty-state">No tool calls yet today</div>';
    return;
  }
  el.innerHTML = tools.map(t =>
    `<div class="tool-row"><span class="tool-name">${escapeHtml(t.tool_name)}</span><span class="tool-count">${t.count}x${t.avg_duration ? ' ~' + Math.round(t.avg_duration) + 'ms' : ''}</span></div>`
  ).join('');
}

function renderTasks(tasks) {
  const el = document.getElementById('taskList');
  const all = [
    ...(tasks.running || []).map(t => ({ ...t, _status: 'running' })),
    ...(tasks.pending || []).map(t => ({ ...t, _status: 'pending' })),
    ...(tasks.completed || []).slice(0, 5).map(t => ({ ...t, _status: t.status }))
  ];
  if (!all.length) {
    el.innerHTML = '<div class="empty-state">No tasks in queue</div>';
    return;
  }
  el.innerHTML = all.map(t => {
    const statusClass = t._status === 'running' ? 'task-running' : t._status === 'pending' ? 'task-pending' : t._status === 'done' ? 'task-done' : 'task-failed';
    return `<div class="task-item"><span class="task-status ${statusClass}">${t._status}</span> ${escapeHtml(t.title || 'Untitled')}</div>`;
  }).join('');
}

function renderErrors(errors) {
  const el = document.getElementById('errorList');
  if (!errors || !errors.length) {
    el.innerHTML = '<div class="empty-state">No recent errors</div>';
    return;
  }
  el.innerHTML = errors.slice(0, 5).map(e => {
    const ts = e.timestamp || e.created_at || '';
    const time = ts ? new Date(ts).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    return `<div class="error-item"><div class="error-time">${time}</div><div class="error-msg">${escapeHtml(e.summary || 'Unknown error')}</div></div>`;
  }).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── AUTO-LOGIN CHECK ─────────────────────────────────────────────────────
(async function init() {
  if (authToken) {
    try {
      const resp = await fetch('/api/status', { headers: { 'X-Auth-Token': authToken } });
      if (resp.ok) {
        showDashboard();
        return;
      }
    } catch (_) {}
    localStorage.removeItem('solomon_dash_token');
    authToken = null;
  }
})();
</script>

<!-- Chat Input UI -->
<div style="position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 15px; z-index: 1000;">
  <form id="chatForm" style="display: flex; gap: 10px; max-width: 1200px; margin: 0 auto;">
    <input 
      type="text" 
      id="chatInput" 
      placeholder="Type a message to Solomon..." 
      style="flex: 1; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px;"
    />
    <button type="submit" style="padding: 12px 24px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
      Send
    </button>
  </form>
</div>

<script>
// Chat form handler
document.getElementById('chatForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'X-Auth-Token': authToken
      },
      body: JSON.stringify({ message })
    });
    
    if (response.ok) {
      input.value = '';
    }
  } catch (err) {
    console.error('Failed to send message:', err);
  }
});
</script>

</body>
