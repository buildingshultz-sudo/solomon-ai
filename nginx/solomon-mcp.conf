# /etc/nginx/sites-available/solomon-mcp
# Reverse proxy: HTTPS -> nginx -> 127.0.0.1:3002 (solomon-mcp Node app)
#
# HTTP-only block below; certbot --nginx will EDIT this file in place to add
# the 443 server block + SSL directives the first time it runs. Until DNS
# resolves mcp.buildingshultz.com -> 167.99.237.26 (the A record Jed must
# create), this server block is dormant -- requests hitting the VPS IP land
# in the default vhost instead.
#
# Key design choices:
#   * Authorization header explicitly forwarded so claude.ai bearer auth
#     reaches the MCP server intact (nginx strips upstream-unfriendly
#     headers by default; we name it to be safe).
#   * proxy_buffering off + Connection upgrade for streamable HTTP / SSE.
#   * Reasonable 60s timeouts -- MCP tool calls (e.g. get_morning_scorecard
#     hitting YouTube API) can take 5-15s, so default 60s is comfortable.

server {
    listen 80;
    listen [::]:80;
    server_name mcp.buildingshultz.com;

    # /health is open (matches the MCP server's own no-auth policy). Useful
    # for monitors and the ACME http-01 challenge during cert issuance.
    location /health {
        proxy_pass http://127.0.0.1:3002/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    # /mcp + everything else go to the bearer-authed MCP endpoint.
    location / {
        proxy_pass http://127.0.0.1:3002;

        # Bearer auth must reach the Node server -- nginx must NOT strip it.
        proxy_set_header Authorization $http_authorization;

        # Standard forwarded headers so the app sees the real client + scheme.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP / SSE upgrade support: HTTP/1.1 + Connection upgrade
        # + no buffering so server-sent events stream to claude.ai without
        # nginx accumulating them in a buffer.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;

        # MCP tool calls can take a few seconds (YT/Telegram API roundtrips);
        # 60s is generous without being a DoS amplifier.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # ACME-style large headers (from CDNs / claude.ai) -- bump buffer.
        proxy_buffer_size 8k;
        client_max_body_size 1m;
    }
}
