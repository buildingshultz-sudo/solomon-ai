<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Solomon Forge</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: #f3ede4;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        position: absolute; inset: 0;
        background:
          radial-gradient(circle at 30% 20%, rgba(229, 130, 35, 0.25), transparent 60%),
          linear-gradient(160deg, #1a1714 0%, #2a221c 100%);
        border: 1px solid rgba(229, 130, 35, 0.35);
        border-radius: 14px;
        box-shadow: 0 18px 60px rgba(0,0,0,0.5);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 14px;
      }
      .mark {
        width: 76px; height: 76px;
        border-radius: 14px;
        background: linear-gradient(135deg, #e58223, #b35a16);
        display: grid; place-items: center;
        box-shadow: 0 0 30px rgba(229,130,35,0.45);
      }
      .mark svg { width: 42px; height: 42px; color: #fff; }
      .title {
        font-size: 22px; font-weight: 700; letter-spacing: 0.5px;
      }
      .stencil {
        font-family: "Consolas", "Courier New", monospace;
        font-size: 10px; letter-spacing: 4px; color: rgba(243,237,228,0.55);
        text-transform: uppercase;
      }
      .bar {
        width: 220px; height: 3px; background: rgba(229,130,35,0.18); border-radius: 2px; overflow: hidden;
      }
      .bar > i {
        display: block; width: 30%; height: 100%;
        background: linear-gradient(90deg, transparent, #e58223, transparent);
        animation: slide 1.4s ease-in-out infinite;
      }
      @keyframes slide { 0% { transform: translateX(-100%);} 100% { transform: translateX(380%);} }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">
        <!-- Flame icon, lucide-react inspired -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
        </svg>
      </div>
      <div class="title">Solomon Forge</div>
      <div class="stencil">Booting the workshop…</div>
      <div class="bar"><i></i></div>
    </div>
  </body>
</html>
